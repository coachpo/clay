name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  OPENAI_API_KEY: sk-ci-placeholder

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Check import sorting
        run: uv run isort --check-only src tests test_cancellation.py

      - name: Check formatting
        run: uv run black --check src tests test_cancellation.py

      - name: Run ruff lint
        run: uv run ruff check src tests test_cancellation.py

      - name: Run mypy type checks
        run: uv run mypy src

      - name: Smoke compile
        run: uv run python -m compileall -q src tests test_cancellation.py start_proxy.py

  docker-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha,scope=docker-ci
          cache-to: type=gha,scope=docker-ci,mode=max
