name: Cleanup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: cleanup-maintenance
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  packages: write

jobs:
  cleanup-ci-workflow-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete stale CI workflow runs (config.py-related runs)
        uses: Mattraks/delete-workflow-runs@v2.0.6
        with:
          delete_workflow_pattern: ci.yml
          retain_days: 14
          keep_minimum_runs: 10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-docker-workflow-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete stale Docker Images workflow runs
        uses: Mattraks/delete-workflow-runs@v2.0.6
        with:
          delete_workflow_pattern: docker-images.yml
          retain_days: 14
          keep_minimum_runs: 10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-untagged-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Delete untagged GHCR package versions
        uses: actions/delete-package-versions@v5
        with:
          owner: ${{ github.repository_owner }}
          package-type: container
          package-name: ${{ github.event.repository.name }}
          delete-only-untagged-versions: true
          min-versions-to-keep: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
